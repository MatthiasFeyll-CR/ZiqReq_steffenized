# E2E test environment — standalone, all services included
# Usage: docker compose -f docker-compose.e2e.yml up --build
# Playwright hits frontend at http://localhost:5173, gateway at http://localhost:8000

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgresql:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ziqreq
      POSTGRES_USER: ziqreq
      POSTGRES_PASSWORD: ziqreq
    ports:
      - "5432:5432"
    volumes:
      - e2e-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziqreq -d ziqreq"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - e2e-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - e2e-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - e2e-net

  # ── Application ─────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      target: build
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_WS_BASE_URL: ws://localhost:8000/ws
      VITE_AUTH_BYPASS: "true"
    command: npm run dev -- --host 0.0.0.0
    networks:
      - e2e-net

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    command: >
      sh -c "
        echo 'Waiting for core service (migrations)...' &&
        until python -c \"import socket; s=socket.create_connection(('core',50051),2); s.close()\" 2>/dev/null; do sleep 2; done &&
        echo 'Core ready. Running gateway migrations...' &&
        python manage.py migrate --fake board 2>/dev/null;
        python manage.py migrate --fake brd 2>/dev/null;
        python manage.py migrate --fake gateway_collaboration 2>/dev/null;
        python manage.py migrate --fake gateway_ideas 2>/dev/null;
        python manage.py migrate --fake review 2>/dev/null;
        python manage.py migrate --noinput &&
        daphne -b 0.0.0.0 -p 8000 gateway.asgi:application
      "
    environment:
      DJANGO_SETTINGS_MODULE: gateway.settings.development
      DB_HOST: postgresql
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CORE_GRPC_ADDRESS: core:50051
      AI_GRPC_ADDRESS: ai:50052
      PDF_GRPC_ADDRESS: pdf:50053
      DEBUG: "true"
      AUTH_BYPASS: "true"
      EMAIL_BACKEND: django.core.mail.backends.filebased.EmailBackend
      EMAIL_FILE_PATH: /tmp/e2e-emails/
    volumes:
      - e2e-emails:/tmp/e2e-emails
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core:
        condition: service_started
    networks:
      - e2e-net

  core:
    build: ./services/core
    ports:
      - "50051:50051"
    command: >
      sh -c "
        until python -c \"import socket; s=socket.create_connection(('postgresql',5432),2); s.close()\" 2>/dev/null; do sleep 1; done &&
        python manage.py migrate --noinput &&
        python grpc_server/server.py
      "
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      DB_HOST: postgresql
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      GATEWAY_GRPC_ADDRESS: gateway:50054
      AI_GRPC_ADDRESS: ai:50052
      PDF_GRPC_ADDRESS: pdf:50053
      DEBUG: "true"
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - e2e-net

  ai:
    build: ./services/ai
    ports:
      - "50052:50052"
    environment:
      DJANGO_SETTINGS_MODULE: ai_service.settings.development
      DB_HOST: postgresql
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CORE_GRPC_ADDRESS: core:50051
      DEBUG: "true"
      AI_MOCK_MODE: "true"
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - e2e-net

  notification:
    build: ./services/notification
    restart: on-failure
    environment:
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      GATEWAY_GRPC_ADDRESS: gateway:50054
      CORE_GRPC_ADDRESS: core:50051
    volumes:
      - ./proto:/app/proto
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - e2e-net

  pdf:
    build: ./services/pdf
    ports:
      - "50053:50053"
    networks:
      - e2e-net

  celery-worker:
    build: ./services/core
    command: celery -A core worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      DB_HOST: postgresql
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - e2e-net

volumes:
  e2e-pgdata:
  e2e-emails:

networks:
  e2e-net:
    driver: bridge
