services:
  # Infrastructure
  nginx:
    image: nginx:alpine
    restart: on-failure
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_started

  postgresql:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ziqreq}
      POSTGRES_USER: ${POSTGRES_USER:-ziqreq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ziqreq_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ziqreq} -d ${POSTGRES_DB:-ziqreq}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Application
  frontend:
    build:
      context: ../../frontend
      target: build
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  gateway:
    build: ../../services/gateway
    ports:
      - "8000:8000"
      - "50054:50054"
    volumes:
      - ../../proto:/app/proto
    command: >
      sh -c "
        echo 'Waiting for core service (migrations)...' &&
        until python -c \"import socket; s=socket.create_connection(('core',50051),2); s.close()\" 2>/dev/null; do sleep 2; done &&
        echo 'Core ready. Running gateway migrations...' &&
        python manage.py migrate --fake gateway_projects 2>/dev/null;
        python manage.py migrate --fake gateway_collaboration 2>/dev/null;
        python manage.py migrate --noinput || exit 1;
        python grpc_server/server.py &
        python events/rabbitmq_subscriber.py &
        daphne -b 0.0.0.0 -p 8000 gateway.asgi:application
      "
    environment:
      DJANGO_SETTINGS_MODULE: gateway.settings.development
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-key-change-me}
      DB_HOST: ${POSTGRES_HOST:-postgresql}
      DB_NAME: ${POSTGRES_DB:-ziqreq}
      DB_USER: ${POSTGRES_USER:-ziqreq}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ziqreq_dev}
      DB_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BROKER_URL: ${BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      CORE_GRPC_ADDRESS: ${CORE_GRPC_ADDRESS:-core:50051}
      AI_GRPC_ADDRESS: ${AI_GRPC_ADDRESS:-ai:50052}
      PDF_GRPC_ADDRESS: ${PDF_GRPC_ADDRESS:-pdf:50053}
      DEBUG: ${DEBUG:-True}
      AUTH_BYPASS: ${AUTH_BYPASS:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core:
        condition: service_started

  core:
    build: ../../services/core
    ports:
      - "50051:50051"
    command: >
      sh -c "
        until python -c \"import socket; s=socket.create_connection(('postgresql',5432),2); s.close()\" 2>/dev/null; do sleep 1; done &&
        python manage.py migrate --noinput &&
        python grpc_server/server.py
      "
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-key-change-me}
      DB_HOST: ${POSTGRES_HOST:-postgresql}
      DB_NAME: ${POSTGRES_DB:-ziqreq}
      DB_USER: ${POSTGRES_USER:-ziqreq}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ziqreq_dev}
      DB_PORT: ${POSTGRES_PORT:-5432}
      BROKER_URL: ${BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      GATEWAY_GRPC_ADDRESS: ${GATEWAY_GRPC_ADDRESS:-gateway:50054}
      AI_GRPC_ADDRESS: ${AI_GRPC_ADDRESS:-ai:50052}
      PDF_GRPC_ADDRESS: ${PDF_GRPC_ADDRESS:-pdf:50053}
      GATEWAY_HEALTH_URL: http://gateway:8000/api/health/
      RABBITMQ_MGMT_URL: http://rabbitmq:15672
      DEBUG: ${DEBUG:-True}
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai:
    build: ../../services/ai
    ports:
      - "50052:50052"
    volumes:
      - ../../proto:/app/proto
    command: >
      sh -c "
        echo 'Waiting for core service (migrations)...' &&
        until python -c \"import socket; s=socket.create_connection(('core',50051),2); s.close()\" 2>/dev/null; do sleep 2; done &&
        echo 'Core ready. Running AI migrations...' &&
        python manage.py migrate --noinput &&
        python main.py
      "
    environment:
      DJANGO_SETTINGS_MODULE: ai_service.settings.development
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-key-change-me}
      DB_HOST: ${POSTGRES_HOST:-postgresql}
      DB_NAME: ${POSTGRES_DB:-ziqreq}
      DB_USER: ${POSTGRES_USER:-ziqreq}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ziqreq_dev}
      DB_PORT: ${POSTGRES_PORT:-5432}
      BROKER_URL: ${BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      CORE_GRPC_ADDRESS: ${CORE_GRPC_ADDRESS:-core:50051}
      DEBUG: ${DEBUG:-True}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      AZURE_OPENAI_DEFAULT_DEPLOYMENT: ${AZURE_OPENAI_DEFAULT_DEPLOYMENT:-}
      AZURE_OPENAI_CHEAP_DEPLOYMENT: ${AZURE_OPENAI_CHEAP_DEPLOYMENT:-}
      AZURE_OPENAI_ESCALATED_DEPLOYMENT: ${AZURE_OPENAI_ESCALATED_DEPLOYMENT:-}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-}
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core:
        condition: service_started

  notification:
    build: ../../services/notification
    restart: on-failure
    environment:
      BROKER_URL: ${BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GATEWAY_GRPC_ADDRESS: ${GATEWAY_GRPC_ADDRESS:-gateway:50054}
      CORE_GRPC_ADDRESS: ${CORE_GRPC_ADDRESS:-core:50051}
      ACS_EMAIL_ENDPOINT: ${ACS_EMAIL_ENDPOINT:-}
      ACS_EMAIL_ACCESS_KEY: ${ACS_EMAIL_ACCESS_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-DoNotReply@ziqreq.com}
    volumes:
      - ../../proto:/app/proto
    depends_on:
      rabbitmq:
        condition: service_healthy

  pdf:
    build: ../../services/pdf
    volumes:
      - ../../proto:/app/proto
    ports:
      - "50053:50053"

  celery-worker:
    build: ../../services/core
    command: celery -A core worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-key-change-me}
      DB_HOST: ${POSTGRES_HOST:-postgresql}
      DB_NAME: ${POSTGRES_DB:-ziqreq}
      DB_USER: ${POSTGRES_USER:-ziqreq}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ziqreq_dev}
      DB_PORT: ${POSTGRES_PORT:-5432}
      BROKER_URL: ${BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      GATEWAY_GRPC_ADDRESS: ${GATEWAY_GRPC_ADDRESS:-gateway:50054}
      AI_GRPC_ADDRESS: ${AI_GRPC_ADDRESS:-ai:50052}
      PDF_GRPC_ADDRESS: ${PDF_GRPC_ADDRESS:-pdf:50053}
      GATEWAY_HEALTH_URL: http://gateway:8000/api/health/
      RABBITMQ_MGMT_URL: http://rabbitmq:15672
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ../../services/core
    command: celery -A core beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-key-change-me}
      DB_HOST: ${POSTGRES_HOST:-postgresql}
      DB_NAME: ${POSTGRES_DB:-ziqreq}
      DB_USER: ${POSTGRES_USER:-ziqreq}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ziqreq_dev}
      DB_PORT: ${POSTGRES_PORT:-5432}
      BROKER_URL: ${BROKER_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      GATEWAY_GRPC_ADDRESS: ${GATEWAY_GRPC_ADDRESS:-gateway:50054}
      AI_GRPC_ADDRESS: ${AI_GRPC_ADDRESS:-ai:50052}
      PDF_GRPC_ADDRESS: ${PDF_GRPC_ADDRESS:-pdf:50053}
      GATEWAY_HEALTH_URL: http://gateway:8000/api/health/
      RABBITMQ_MGMT_URL: http://rabbitmq:15672
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
