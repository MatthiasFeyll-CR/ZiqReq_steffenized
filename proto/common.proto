syntax = "proto3";

package ziqreq.common;


message UserRef {
  string id = 1;
  string display_name = 2;
  string email = 3;
}

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 total_count = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message Error {
  string code = 1;
  string message = 2;
}

message Reaction {
  string id = 1;
  string message_id = 2;
  string reaction_type = 3;
  string created_by_type = 4;
  string created_by_id = 5;
  string created_at = 6;
}
