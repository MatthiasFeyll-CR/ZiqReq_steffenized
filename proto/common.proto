syntax = "proto3";

package ziqreq.common;


message UserRef {
  string id = 1;
  string display_name = 2;
  string email = 3;
}

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 total_count = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message Error {
  string code = 1;
  string message = 2;
}

message Reaction {
  string id = 1;
  string message_id = 2;
  string reaction_type = 3;
  string created_by_type = 4;
  string created_by_id = 5;
  string created_at = 6;
}

message BoardNode {
  string id = 1;
  string idea_id = 2;
  string node_type = 3;
  string content = 4;
  double x_position = 5;
  double y_position = 6;
  string parent_id = 7;
  int32 sort_order = 8;
  string created_at = 9;
  string updated_at = 10;
}

message BoardConnection {
  string id = 1;
  string idea_id = 2;
  string source_node_id = 3;
  string target_node_id = 4;
  string label = 5;
  string created_at = 6;
}
