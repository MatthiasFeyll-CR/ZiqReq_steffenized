syntax = "proto3";

package ziqreq.core;

import "common.proto";

service CoreService {
  rpc GetProjectContext(ProjectContextRequest) returns (ProjectContextResponse);
  rpc GetFullChatHistory(FullChatHistoryRequest) returns (FullChatHistoryResponse);
  rpc PersistAiChatMessage(AiChatMessageRequest) returns (AiChatMessageResponse);
  rpc PersistAiReaction(AiReactionRequest) returns (AiReactionResponse);
  rpc UpdateProjectTitle(UpdateTitleRequest) returns (UpdateTitleResponse);
  rpc UpdateBrdDraft(UpdateBrdDraftRequest) returns (UpdateBrdDraftResponse);
  rpc GetRequirementsState(GetRequirementsStateRequest) returns (GetRequirementsStateResponse);
  rpc UpdateRequirementsStructure(UpdateRequirementsStructureRequest) returns (UpdateRequirementsStructureResponse);

  rpc GetProjectsByState(ProjectsByStateRequest) returns (ProjectsByStateResponse);
  rpc GetUserStats(GetUserStatsRequest) returns (UserStatsResponse);
  rpc GetRateLimitStatus(RateLimitRequest) returns (RateLimitResponse);
}

message ProjectContextRequest {
  string project_id = 1;
  int32 recent_message_limit = 2;
  bool include_brd_draft = 3;
}

message ProjectContextResponse {
  ProjectMetadata metadata = 1;
  repeated ChatMessage recent_messages = 2;
  BrdDraftState brd_draft = 3;
  repeated UserInfo active_users = 5;
}

message ProjectMetadata {
  string project_id = 1;
  string title = 2;
  bool title_manually_edited = 3;
  string state = 4;
  string agent_mode = 5;
  string owner_display_name = 6;
  string co_owner_display_name = 7;
  string project_type = 8;
}

message BrdDraftState {
  string project_id = 1;
  map<string, string> sections = 2;
  map<string, bool> locked_sections = 3;
  string updated_at = 4;
}

message UserInfo {
  string id = 1;
  string display_name = 2;
  string role = 3;
}

message ChatMessage {
  string id = 1;
  string sender_type = 2;
  string sender_display_name = 3;
  string content = 4;
  string message_type = 5;
  string created_at = 6;
  repeated ziqreq.common.Reaction reactions = 7;
}

message FullChatHistoryRequest {
  string project_id = 1;
}

message FullChatHistoryResponse {
  repeated ChatMessage messages = 1;
}

message AiChatMessageRequest {
  string project_id = 1;
  string content = 2;
  string message_type = 3;
  string language = 4;
  string processing_id = 5;
}

message AiChatMessageResponse {
  string message_id = 1;
  string created_at = 2;
}

message AiReactionRequest {
  string project_id = 1;
  string message_id = 2;
  string reaction_type = 3;
}

message AiReactionResponse {
  string reaction_id = 1;
}

message UpdateTitleRequest {
  string project_id = 1;
  string new_title = 2;
}

message UpdateTitleResponse {
  bool success = 1;
}

message UpdateBrdDraftRequest {
  string project_id = 1;
  map<string, string> sections = 2;
  string readiness_evaluation_json = 3;
}

message UpdateBrdDraftResponse {
  bool success = 1;
}

message GetRequirementsStateRequest {
  string project_id = 1;
}

message GetRequirementsStateResponse {
  string project_id = 1;
  string title = 2;
  string short_description = 3;
  string structure_json = 4;
  string item_locks_json = 5;
  bool allow_information_gaps = 6;
  string readiness_evaluation_json = 7;
  string updated_at = 8;
}

message StructureMutation {
  string operation = 1;  // add_epic, update_story, remove_milestone, reorder_packages, etc.
  string data_json = 2;  // JSON-encoded operation-specific data
}

message UpdateRequirementsStructureRequest {
  string project_id = 1;
  repeated StructureMutation mutations = 2;
}

message MutationResult {
  string operation = 1;
  string status = 2;  // "success" or "failed"
  string error = 3;   // Error message if status is failed
}

message UpdateRequirementsStructureResponse {
  bool accepted = 1;
  int32 mutation_count = 2;
  repeated MutationResult mutations_applied = 3;
}

message ProjectsByStateRequest {}

message ProjectsByStateResponse {
  repeated StateCount counts = 1;
}

message StateCount {
  string state = 1;
  int32 count = 2;
}

message GetUserStatsRequest {
  string user_id = 1;
}

message UserStatsResponse {
  int32 project_count = 1;
  int32 review_count = 2;
  int32 contribution_count = 3;
}

message RateLimitRequest {
  string project_id = 1;
}

message RateLimitResponse {
  int32 current_count = 1;
  int32 cap = 2;
  bool is_locked = 3;
}
