[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "gateway.settings.test"
asyncio_mode = "auto"
addopts = "--reuse-db"
pythonpath = [
    "services/gateway",
    "services/core",
    "services/ai",
]

[tool.ruff]
target-version = "py312"
line-length = 180

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
